server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;

    index index.php index.html;
    charset utf-8;

    # Proteksi keamanan dasar (Mencegah Clickjacking & Sniffing)
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Jalur Request HTTP Utama Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # Meneruskan Pemrosesan PHP ke Container PHP-FPM
    location ~ \.php$ {
        fastcgi_pass laravel-app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # KUNCI UTAMA: Mencegat koneksi WebSocket Reverb dan meneruskannya secara asinkron
# KUNCI UTAMA: Mencegat koneksi WebSocket Reverb
    location /app {
        proxy_pass http://laravel-reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # TAMBAHAN: Cegah Nginx memutus koneksi WebSocket terlalu cepat
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Blokir akses ke file tersembunyi (seperti .env)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}