services:
  laravel-web:
    image: nginx:alpine
    container_name: laravel-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - public_data:/var/www/html/public
    depends_on:
      laravel-app:
        condition: service_started
      laravel-reverb:
        condition: service_started

  laravel-app:
    build:
      context: .
    container_name: laravel-app
    restart: unless-stopped
    # HAPUS BLOK 'environment' DAN GANTI DENGAN INI:
    env_file:
      - .env
    volumes:
      - public_data:/var/www/html/public
    depends_on:
      mysql-db:
        condition: service_healthy

  laravel-reverb:
    build:
      context: .
    container_name: laravel-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    expose:
      - "8080"
    # HAPUS BLOK 'environment' DAN GANTI DENGAN INI:
    env_file:
      - .env
    depends_on:
      mysql-db:
        condition: service_healthy

  mysql-db:
    image: mariadb:10.11
    container_name: mysql-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: rootsecurepassword
    volumes:
      - mariadb_data:/var/lib/mysql
    # TAMBAHKAN BLOK HEALTHCHECK INI
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -prootsecurepassword || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
  public_data: